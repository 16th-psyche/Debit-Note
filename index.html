<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Reimbursement – QuantumLeap</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ─── Header ──────────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <img src="assets/QL Logo.png" alt="QuantumLeap" style="height: 32px; width: auto;" />
        <span>Expense Reimbursement</span>
      </div>
      <div class="header-actions">
        <span id="saveIndicator" class="save-indicator"></span>
        <button class="btn-secondary" onclick="clearForm()">Clear</button>
<button class="btn-primary" onclick="downloadPDF()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF
        </button>
      </div>
    </div>
  </header>

  <!-- ─── Split Layout ─────────────────────────────────────────── -->
  <div class="app-layout">

    <!-- LEFT: Form Panel -->
    <section class="builder-panel" id="builderPanel">

      <!-- Employee Info — mirrors PDF info-bar (left 60% / right 40%) -->
      <div class="card">
        <div class="card-title">Employee Information</div>
        <div class="info-bar">
          <div class="info-left">
            <div class="form-group">
              <label for="employeeName">Employee Name</label>
              <input type="text" id="employeeName" placeholder="e.g. Krishna Sagar"
                oninput="clearFieldError(this); saveState()" />
            </div>
            <div class="form-group">
              <label for="managerName">Manager Name</label>
              <input type="text" id="managerName" placeholder="e.g. Chethan H R"
                oninput="clearFieldError(this); saveState()" />
            </div>
            <div class="form-group">
              <label for="department">Department</label>
              <input type="text" id="department" placeholder="e.g. Marketing"
                oninput="clearFieldError(this); saveState()" />
            </div>
          </div>
          <div class="info-right">
            <div class="form-group">
              <label for="expensePeriod">Expense Period</label>
              <input type="month" id="expensePeriod" oninput="saveState()" />
            </div>
            <div class="form-group">
              <label for="submissionDate">Submission Date</label>
              <input type="date" id="submissionDate" oninput="saveState()" />
            </div>
          </div>
        </div>
      </div>

      <!-- Expense Entries -->
      <div class="card">
        <div class="card-title">Expense Items</div>
        <div class="expense-table-wrapper">
          <table class="expense-table">
            <thead>
              <tr>
                <th class="col-date">Date</th>
                <th class="col-desc">Description</th>
                <th class="col-cat">Category</th>
                <th class="col-bill">Bill Number</th>
                <th class="col-amount">Amount (₹)</th>
                <th class="col-action"></th>
              </tr>
            </thead>
            <tbody id="expenseRows"></tbody>
          </table>
        </div>

        <div id="emptyState" class="empty-state">No expenses yet. Click "+ Add Expense" to begin.</div>

        <button class="btn-add" onclick="addExpense()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Expense
        </button>

        <!-- Totals -->
        <div class="totals-section">
          <div class="totals-row">
            <span class="label">Subtotal</span>
            <span class="value" id="subtotalDisplay">₹ 0.00</span>
          </div>
          <div class="totals-row">
            <span class="label">Less Cash Advance (if applicable)</span>
            <input class="cash-advance-input" type="number" id="cashAdvance"
              min="0" step="0.01" placeholder="0.00"
              oninput="updateTotals(); saveState()" />
          </div>
          <div class="totals-row total">
            <span class="label">Total Reimbursement</span>
            <span class="value" id="totalDisplay">₹ 0.00</span>
          </div>
        </div>

        <div class="reminder-note">Don't forget to attach receipts/bills!</div>
      </div>

    </section>

    <!-- RIGHT: Live Preview -->
    <section class="preview-panel" id="previewPanel">
      <div class="preview-header">
        <span class="preview-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Live Preview
        </span>
        <div class="zoom-controls">
          <button onclick="adjustZoom(-0.05)" title="Zoom out">−</button>
          <span id="zoomLabel">100%</span>
          <button onclick="adjustZoom(0.05)" title="Zoom in">+</button>
        </div>
      </div>
      <div class="preview-scroll">
        <div class="preview-zoom-wrapper" id="previewZoomWrapper">
          <div id="previewOutput"></div>
        </div>
      </div>
    </section>

  </div>

  <!-- ─── Toast ────────────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
